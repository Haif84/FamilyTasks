name: Deploy to VPS

# CD: SSH to your VPS, pull latest code, rebuild and restart the bot container.
# Configure repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST              — hostname or IP
#   VPS_USER              — SSH user (e.g. deploy)
#   VPS_SSH_PRIVATE_KEY   — full private key (PEM), including BEGIN/END lines
#   VPS_DEPLOY_PATH       — absolute path to repo clone on server (e.g. /home/deploy/FamilyTasks)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch or tag)"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: create a GitHub Environment "production" with required reviewers, then uncomment:
    # environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_REF: ${{ github.event.inputs.ref || github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: GIT_REF
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch --all --tags
            if git show-ref --verify --quiet "refs/heads/${GIT_REF}"; then
              git checkout "${GIT_REF}"
              git pull --ff-only origin "${GIT_REF}"
            elif git show-ref --verify --quiet "refs/tags/${GIT_REF}"; then
              git checkout "${GIT_REF}"
            else
              git checkout main
              git pull --ff-only origin main
            fi
            if [[ "${GIT_REF}" =~ ^v([0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]+)$ ]]; then
              APP_VERSION="${BASH_REMATCH[1]}"
            else
              today="$(date +%Y.%m.%d)"
              tag_n="$(git tag -l "v${today}.*" | sed -E "s/^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.([0-9]+)$/\1/" | sort -n | tail -1)"
              if [ -z "${tag_n}" ]; then
                tag_n=0
              fi
              current_n=0
              current_version="$(
                docker compose ps -q bot 2>/dev/null \
                  | xargs -r docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null \
                  | sed -n 's/^APP_VERSION=//p' \
                  | head -1
              )"
              if [[ "${current_version}" =~ ^${today//./\\.}\.([0-9]+)$ ]]; then
                current_n="${BASH_REMATCH[1]}"
              fi
              if [ "${current_n}" -gt "${tag_n}" ]; then
                base_n="${current_n}"
              else
                base_n="${tag_n}"
              fi
              APP_VERSION="${today}.$((base_n + 1))"
            fi
            echo "Deploy APP_VERSION=${APP_VERSION}"
            docker compose pull || true
            export CACHEBUST="$(date +%s)"
            export APP_VERSION
            docker compose build --pull
            docker compose up -d --remove-orphans
            docker compose ps
