# Production-oriented stack for VPS.
# Copy .env on the server (never commit secrets). See docs/DEPLOY.md

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Меняется при каждом вызове deploy-vps.ps1, чтобы Docker не использовал старый кэш без нового кода.
        CACHEBUST: ${CACHEBUST:-0}
    image: family-tasks-bot:latest
    container_name: family-tasks-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # DB_PATH без ${DB_PATH:-…}: иначе из .env (часто путь с Windows) подставится в compose и сломает SQLite.
      DB_PATH: /app/data/family_tasks.sqlite3
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:
    driver: local
